<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Publicités - EcomSolutions</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/composents.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar"></aside>
  <main class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <h3 class="topbar-title">Publicités</h3>
        <p class="topbar-subtitle"></p>
      </div>
      <div class="topbar-right">
        <button class="topbar-btn" onclick="window.location='/help.html'" title="Aide">❓</button>
        <button class="topbar-btn topbar-avatar" id="user-avatar-btn" onclick="logout()" title="Déconnexion"></button>
      </div>
    </header>
    <div class="page-container">
      <div class="page-header">
        <div class="page-header-left"><h1>Publicités & Campagnes</h1><p>Gérez vos campagnes marketing</p></div>
        <div class="page-header-actions">
          <button class="btn btn-primary" onclick="openCreateAdModal()">+ Nouvelle Campagne</button>
        </div>
      </div>

      <!-- KPI -->
      <div class="grid grid-4 mb-24" id="adsSummary"></div>

      <!-- CHARTS -->
      <div class="grid grid-2 mb-24">
        <div class="card"><div class="card-header"><h3 class="card-title">Budget vs Dépensé</h3></div><div style="height:220px"><canvas id="adsChart1"></canvas></div></div>
        <div class="card"><div class="card-header"><h3 class="card-title">CTR par Campagne</h3></div><div style="height:220px"><canvas id="adsChart2"></canvas></div></div>
      </div>

      <!-- TABLE -->
      <div class="card">
        <div class="card-header">
          <h3 class="card-title">Toutes les campagnes</h3>
          <input type="search" id="searchAds" class="form-control form-control-sm" placeholder="🔍 Rechercher..." style="width:220px">
        </div>
        <div class="table-scroll">
          <table>
            <thead><tr><th>Nom</th><th>Plateforme</th><th>Audience</th><th>Budget</th><th>Dépensé</th><th>Impressions</th><th>Clics</th><th>CTR</th><th>Statut</th><th>Actions</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>

      <!-- MODAL -->
      <div class="modal-overlay" id="adModal" style="display:none">
        <div class="modal" style="max-width:560px">
          <div class="modal-header">
            <h3 class="modal-title">Nouvelle Campagne</h3>
            <button class="modal-close" onclick="closeModal('adModal')">✕</button>
          </div>
          <div class="modal-body">
            <form id="adForm" onsubmit="handleAdSubmit(event)">
              <div class="form-grid">
                <div class="form-group"><label class="form-label">Nom *</label><input type="text" id="adName" class="form-control" required></div>
                <div class="form-group"><label class="form-label">Plateforme *</label>
                  <select id="adPlatform" class="form-control" required>
                    <option value="">Choisir</option>
                    <option value="facebook">Facebook/Instagram</option>
                    <option value="google">Google Ads</option>
                    <option value="tiktok">TikTok</option>
                    <option value="linkedin">LinkedIn</option>
                    <option value="twitter">Twitter/X</option>
                  </select></div>
              </div>
              <div class="form-group"><label class="form-label">Description</label><textarea id="adDescription" class="form-control" rows="2" placeholder="Détails..."></textarea></div>
              <div class="form-grid">
                <div class="form-group"><label class="form-label">Budget (€) *</label><input type="number" id="adBudget" class="form-control" step="0.01" min="0" required></div>
                <div class="form-group"><label class="form-label">Dépensé (€)</label><input type="number" id="adSpent" class="form-control" step="0.01" min="0" value="0"></div>
              </div>
              <div class="form-group"><label class="form-label">Audience Cible</label><input type="text" id="adAudience" class="form-control" placeholder="18-35 ans, e-commerce..."></div>
              <div class="form-group"><label class="form-label">Statut</label>
                <select id="adStatus" class="form-control">
                  <option value="active">Active</option>
                  <option value="paused">En pause</option>
                  <option value="completed">Terminée</option>
                </select></div>
            </form>
          </div>
          <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal('adModal')">Annuler</button>
            <button class="btn btn-primary" onclick="document.getElementById('adForm').dispatchEvent(new Event('submit',{bubbles:true}))">Enregistrer</button>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
<div id="toast-container" class="toast-container"></div>
<script src="/js/auth.js"></script>
<script src="/js/api.js"></script>
<script src="/js/sidebar.js"></script>
<script src="/js/ads.js"></script>
<script>(function(){const u=requireAuth();if(u){const b=document.getElementById('user-avatar-btn');if(b)b.textContent=u.avatar;}})();</script>
</body>
</html>
