<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcomSolutions — Connexion</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    .login-page {
      display: flex;
      min-height: 100vh;
      background: var(--bg-primary);
    }

    .login-left {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
      overflow: hidden;
    }

    .login-left::before {
      content: '';
      position: absolute;
      inset: -50%;
      background: radial-gradient(circle, rgba(79,110,247,0.1) 0%, transparent 70%);
      animation: float 8s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(30px); }
    }

    .login-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 400px;
    }

    .login-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .login-logo {
      width: 56px;
      height: 56px;
      background: var(--gradient-blue);
      border-radius: var(--radius-sm);
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      box-shadow: var(--shadow-glow);
    }

    .login-header h1 {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .login-header p {
      color: var(--text-muted);
      font-size: 0.88rem;
    }

    .login-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
      background: var(--bg-card);
      padding: 4px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
    }

    .login-tab {
      flex: 1;
      padding: 10px;
      border-radius: 6px;
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: var(--transition);
    }

    .login-tab.active {
      background: var(--bg-hover);
      color: var(--text-primary);
      border: 1px solid var(--border-light);
    }

    .login-form {
      display: none;
    }

    .login-form.active {
      display: block;
      animation: slideUp 0.3s ease;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .form-control {
      width: 100%;
      padding: 11px 14px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: 0.88rem;
      transition: var(--transition);
      outline: none;
    }

    .form-control:focus {
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 3px rgba(79,110,247,0.1);
      background: var(--bg-hover);
    }

    .form-control::placeholder {
      color: var(--text-muted);
    }

    .form-check {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
    }

    .form-check input {
      width: 16px;
      height: 16px;
      cursor: pointer;
      accent-color: var(--accent-blue);
    }

    .form-check label {
      font-size: 0.83rem;
      color: var(--text-secondary);
      cursor: pointer;
    }

    .btn-login {
      width: 100%;
      padding: 11px 16px;
      background: var(--gradient-blue);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-weight: 700;
      font-size: 0.88rem;
      cursor: pointer;
      transition: var(--transition);
      box-shadow: var(--shadow-glow);
    }

    .btn-login:hover {
      opacity: 0.95;
      transform: translateY(-1px);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .login-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
      color: var(--text-muted);
      font-size: 0.78rem;
    }

    .login-divider::before,
    .login-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .demo-users {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 24px;
    }

    .demo-btn {
      padding: 10px 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 0.78rem;
      font-weight: 600;
      transition: var(--transition);
    }

    .demo-btn:hover {
      background: var(--bg-hover);
      border-color: var(--border-light);
      color: var(--text-primary);
    }

    .error-msg {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      color: var(--accent-red);
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      font-size: 0.8rem;
      margin-bottom: 16px;
      display: none;
    }

    .error-msg.show {
      display: block;
    }

    .login-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .login-footer a {
      color: var(--accent-blue);
      text-decoration: none;
      font-weight: 600;
    }

    .login-footer a:hover {
      color: var(--accent-blue-light);
    }

    @media (max-width: 900px) {
      .login-container {
        max-width: 380px;
      }
    }

    @media (max-width: 600px) {
      .login-page {
        padding: 20px;
      }

      .login-left {
        padding: 30px 20px;
      }

      .login-header h1 {
        font-size: 1.2rem;
      }

      .login-container {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-left">
      <div class="login-container">
        <div class="login-header">
          <div class="login-logo">💼</div>
          <h1>EcomSolutions</h1>
          <p>Plateforme complète de gestion e-commerce</p>
        </div>

        <div class="login-tabs">
          <button class="login-tab active" onclick="switchTab('login')">Connexion</button>
          <button class="login-tab" onclick="switchTab('register')">Inscription</button>
        </div>

        <!-- FORM LOGIN -->
        <form class="login-form active" id="login-form" onsubmit="handleLogin(event)">
          <div class="error-msg" id="login-error"></div>

          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" id="login-email" placeholder="email@example.com" required>
          </div>

          <div class="form-group">
            <label class="form-label">Mot de passe</label>
            <input type="password" class="form-control" id="login-password" placeholder="••••••••" required>
          </div>

          <div class="form-check">
            <input type="checkbox" id="remember" value="true">
            <label for="remember">Se souvenir de moi</label>
          </div>

          <button type="submit" class="btn-login">Se connecter</button>

          <div class="login-divider">Comptes de démo</div>

          <div class="demo-users">
            <button type="button" class="demo-btn" onclick="demoLogin('admin@ecom.com', 'admin123')">
              🛡️ Admin
            </button>
            <button type="button" class="demo-btn" onclick="demoLogin('jean@ecom.com', 'client123')">
              👤 Client
            </button>
          </div>

          <div class="login-footer">
            Pas encore inscrit ? <a href="#" onclick="switchTab('register'); return false;">Créer un compte</a>
          </div>
        </form>

        <!-- FORM REGISTER -->
        <form class="login-form" id="register-form" onsubmit="handleRegister(event)">
          <div class="error-msg" id="register-error"></div>

          <div class="form-group">
            <label class="form-label">Nom complet</label>
            <input type="text" class="form-control" id="register-name" placeholder="Votre nom" required>
          </div>

          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" id="register-email" placeholder="email@example.com" required>
          </div>

          <div class="form-group">
            <label class="form-label">Mot de passe</label>
            <input type="password" class="form-control" id="register-password" placeholder="Min. 8 caractères" required minlength="8">
          </div>

          <div class="form-group">
            <label class="form-label">Confirmez le mot de passe</label>
            <input type="password" class="form-control" id="register-confirm" placeholder="••••••••" required>
          </div>

          <div class="form-group">
            <label class="form-label">Plan</label>
            <select class="form-control" id="register-plan">
              <option value="Starter">Starter - 29€/mois</option>
              <option value="Pro">Pro - 79€/mois</option>
              <option value="Agency">Agency - 199€/mois</option>
            </select>
          </div>

          <button type="submit" class="btn-login">S'inscrire</button>

          <div class="login-footer">
            Déjà inscrit ? <a href="#" onclick="switchTab('login'); return false;">Se connecter</a>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    function switchTab(tab) {
      document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.login-form').forEach(f => f.classList.remove('active'));
      document.querySelector(`[onclick*="'${tab}'"]`).classList.add('active');
      document.getElementById(`${tab}-form`).classList.add('active');
      document.getElementById(`${tab}-error`).classList.remove('show');
    }

    function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const remember = document.getElementById('remember').checked;
      const errorEl = document.getElementById('login-error');

      if (!email || !password) {
        errorEl.textContent = '❌ Veuillez remplir tous les champs.';
        errorEl.classList.add('show');
        return;
      }

      const result = login(email, password, remember);
      if (!result.success) {
        errorEl.textContent = `❌ ${result.message}`;
        errorEl.classList.add('show');
        return;
      }

      showToast(`✅ Bienvenue ${result.user.name} !`, 'success');
      setTimeout(() => window.location.href = '/dashboard.html', 600);
    }

    function handleRegister(e) {
      e.preventDefault();
      const name = document.getElementById('register-name').value.trim();
      const email = document.getElementById('register-email').value.trim();
      const password = document.getElementById('register-password').value;
      const confirm = document.getElementById('register-confirm').value;
      const plan = document.getElementById('register-plan').value;
      const errorEl = document.getElementById('register-error');

      if (!name || !email || !password || !confirm) {
        errorEl.textContent = '❌ Veuillez remplir tous les champs.';
        errorEl.classList.add('show');
        return;
      }

      if (password !== confirm) {
        errorEl.textContent = '❌ Les mots de passe ne correspondent pas.';
        errorEl.classList.add('show');
        return;
      }

      if (password.length < 8) {
        errorEl.textContent = '❌ Le mot de passe doit contenir au moins 8 caractères.';
        errorEl.classList.add('show');
        return;
      }

      const result = register(name, email, password, plan);
      if (!result.success) {
        errorEl.textContent = `❌ ${result.message}`;
        errorEl.classList.add('show');
        return;
      }

      showToast(`✅ Compte créé ! Bienvenue ${result.user.name} !`, 'success');
      setTimeout(() => window.location.href = '/dashboard.html', 600);
    }

    function demoLogin(email, password) {
      const result = login(email, password, true);
      if (result.success) {
        const role = result.user.role;
        showToast(`✅ Connecté en tant que ${role === 'admin' ? 'administrateur' : 'client'}`, 'success');
        setTimeout(() => window.location.href = '/dashboard.html', 600);
      }
    }

    // Redirection si déjà connecté
    if (getCurrentUser()) window.location.href = '/dashboard.html';
  </script>
</body>
</html>
