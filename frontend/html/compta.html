<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comptabilité - EcomSolutions</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/composents.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar"></aside>
  <main class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <h3 class="topbar-title">Comptabilité</h3>
        <p class="topbar-subtitle"></p>
      </div>
      <div class="topbar-right">
        <button class="topbar-btn" onclick="window.location='/help.html'" title="Aide">❓</button>
        <button class="topbar-btn topbar-avatar" id="user-avatar-btn" onclick="logout()" title="Déconnexion"></button>
      </div>
    </header>
    <div class="page-container">
      <div class="page-header">
        <div class="page-header-left"><h1>Comptabilité</h1><p>Suivi de vos finances</p></div>
        <div class="page-header-actions">
          <button class="btn btn-primary" onclick="openCreateAccountingModal()">+ Nouvelle Entrée</button>
          <button class="btn btn-secondary" onclick="exportCSV()">📥 CSV</button>
          <button class="btn btn-secondary" onclick="printReport()">🖨️ Imprimer</button>
        </div>
      </div>

      <!-- KPI CARDS -->
      <div class="grid grid-4 mb-24" id="accountingSummary"></div>

      <!-- CHART + TABLE -->
      <div class="grid grid-2 mb-24">
        <div class="card">
          <div class="card-header"><h3 class="card-title">Répartition financière</h3></div>
          <div style="height:260px;display:flex;align-items:center;justify-content:center">
            <canvas id="accountingChart" style="max-height:250px"></canvas>
          </div>
        </div>
        <div class="card">
          <div class="card-header"><h3 class="card-title">📋 Résumé</h3></div>
          <div id="accounting-quick-stats" style="padding:8px 0"></div>
        </div>
      </div>

      <!-- TABLE -->
      <div class="card">
        <div class="card-header">
          <h3 class="card-title">Toutes les entrées</h3>
          <input type="search" id="searchAccounting" class="form-control form-control-sm" placeholder="🔍 Rechercher..." style="width:220px">
        </div>
        <div class="table-scroll">
          <table id="accounting-table">
            <thead><tr><th>Date</th><th>Description</th><th>Catégorie</th><th>Type</th><th style="text-align:right">Montant</th><th>Facture</th><th>Actions</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>

      <!-- MODAL -->
      <div class="modal-overlay" id="accountingModal" style="display:none">
        <div class="modal" style="max-width:560px">
          <div class="modal-header">
            <h3 class="modal-title">Nouvelle Entrée Comptable</h3>
            <button class="modal-close" onclick="closeModal('accountingModal')">✕</button>
          </div>
          <div class="modal-body">
            <form id="accountingForm" onsubmit="handleAccountingSubmit(event)">
              <div class="form-grid">
                <div class="form-group"><label class="form-label">Type *</label>
                  <select id="accountingType" class="form-control" required>
                    <option value="">Sélectionner</option>
                    <option value="income">Revenu</option>
                    <option value="expense">Dépense</option>
                    <option value="tax">Taxe</option>
                    <option value="refund">Remboursement</option>
                  </select></div>
                <div class="form-group"><label class="form-label">Catégorie</label>
                  <input type="text" id="accountingCategory" class="form-control" placeholder="Ventes, Matériel..."></div>
              </div>
              <div class="form-group"><label class="form-label">Description *</label>
                <textarea id="accountingDescription" class="form-control" rows="2" required placeholder="Description..."></textarea></div>
              <div class="form-grid">
                <div class="form-group"><label class="form-label">Montant (€) *</label>
                  <input type="number" id="accountingAmount" class="form-control" step="0.01" min="0" required placeholder="0.00"></div>
                <div class="form-group"><label class="form-label">N° Facture</label>
                  <input type="text" id="accountingInvoice" class="form-control" placeholder="FAC-001"></div>
              </div>
              <div class="form-group"><label class="form-label">Notes</label>
                <textarea id="accountingNotes" class="form-control" rows="2" placeholder="Notes internes..."></textarea></div>
            </form>
          </div>
          <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal('accountingModal')">Annuler</button>
            <button class="btn btn-primary" onclick="document.getElementById('accountingForm').dispatchEvent(new Event('submit',{bubbles:true}))">Enregistrer</button>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
<div id="toast-container" class="toast-container"></div>
<script src="/js/auth.js"></script>
<script src="/js/api.js"></script>
<script src="/js/sidebar.js"></script>
<script src="/js/compta.js"></script>
<script>(function(){const u=requireAuth();if(u){const b=document.getElementById('user-avatar-btn');if(b)b.textContent=u.avatar;}})();</script>
</body>
</html>
