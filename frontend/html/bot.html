<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IA Bot — EcomSolutions</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
<div class="app-layout">
  <div class="main-content" id="mainContent">
    <div id="topbarContainer"></div>
    <div style="display:flex;height:calc(100vh - 65px);">

      <!-- LEFT: Conversations -->
      <div style="width:280px;background:var(--bg-secondary);border-right:1px solid var(--border);
        display:flex;flex-direction:column;flex-shrink:0;">
        <div style="padding:16px;border-bottom:1px solid var(--border);">
          <button class="btn btn-primary" style="width:100%;" onclick="newConversation()">
            ✏️ Nouvelle conversation
          </button>
        </div>
        <div style="flex:1;overflow-y:auto;padding:8px;" id="convList"></div>
      </div>

      <!-- RIGHT: Chat -->
      <div style="flex:1;display:flex;flex-direction:column;">
        <div class="chat-messages" id="chatMessages"></div>

        <!-- SUGGESTIONS -->
        <div style="padding:0 24px 12px;display:flex;gap:8px;flex-wrap:wrap;" id="suggestions"></div>

        <div class="chat-input-area">
          <textarea class="chat-input" id="chatInput" placeholder="Posez votre question e-commerce..."
            rows="1" onkeydown="handleChatKey(event)"
            oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
          <button class="btn btn-primary" onclick="sendMessage()">
            <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="toast-container" id="toastContainer"></div>
<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/bot.js"></script>
</body>
</html>
